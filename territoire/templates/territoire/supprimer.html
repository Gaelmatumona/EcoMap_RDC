{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="alert alert-danger">

        <h4>Confirmation</h4>

        <p>

            Voulez-vous vraiment supprimer :

            <strong>{{ lieu.nom }}</strong> ?

        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <button class="btn btn-danger">

            Oui, supprimer

        </button>

        <a href="{% url 'liste_lieux' %}" class="btn btn-secondary">

            Annuler

        </a>

    </form>

</div>

{% endblock %}
