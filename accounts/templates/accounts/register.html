<!DOCTYPE html>
<html>
<head>
    <title>Inscription</title>
</head>
<body>

<h2>Créer un compte</h2>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        S'inscrire
    </button>

</form>

<p>
    <a href="{% url 'login' %}">
        Se connecter
    </a>
</p>

</body>
</html>
