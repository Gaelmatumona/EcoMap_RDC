{% extends "base.html" %}

{% block content %}

<h2>Carte Interactive EcoMap RDC</h2>

<div id="map" style="height:700px;"></div>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-4.325, 15.322], 12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap'
}
).addTo(map);


{% for lieu in lieux %}

{% if lieu.latitude and lieu.longitude %}

L.marker([
{{ lieu.latitude }},
{{ lieu.longitude }}
])
.addTo(map)
.bindPopup(
"<b>{{ lieu.nom }}</b><br>{{ lieu.get_type_lieu_display }}"
);

{% endif %}

{% endfor %}


{% for signalement in signalements %}

{% if signalement.latitude and signalement.longitude %}

var couleur = "blue";

{% if signalement.statut == "EN_ATTENTE" %}
couleur = "orange";
{% elif signalement.statut == "EN_COURS" %}
couleur = "blue";
{% elif signalement.statut == "RESOLU" %}
couleur = "green";
{% elif signalement.statut == "REJETE" %}
couleur = "red";
{% endif %}

L.circleMarker(
[
{{ signalement.latitude }},
{{ signalement.longitude }}
],
{
radius:8,
color:couleur,
fillColor:couleur,
fillOpacity:0.8,
weight:2
}
)
.addTo(map)
.bindPopup(
"<b>{{ signalement.titre }}</b><br>"
+
"Catégorie : {{ signalement.categorie.nom }}<br>"
+
"Statut : {{ signalement.get_statut_display }}<br>"
+
"Description : {{ signalement.description }}"
);

{% endif %}

{% endfor %}


var marqueur = null;

map.on("click", function(e){

    var latitude = e.latlng.lat;
    var longitude = e.latlng.lng;

    if(marqueur){
        map.removeLayer(marqueur);
    }

    marqueur = L.marker([latitude, longitude]).addTo(map);

    if(confirm("Créer un signalement à cet endroit ?")){

        fetch(
            "/carte/enregistrer-position/?latitude="
            + latitude +
            "&longitude=" +
            longitude
        )
        .then(response => response.json())
        .then(data => {

            if(data.success){

                window.location.href="/signalements/ajouter/";

            }

        });

    }

});
var legende = L.control({position: "bottomright"});

legende.onAdd = function () {

    var div = L.DomUtil.create("div", "info legend");

    div.style.background = "white";
    div.style.padding = "10px";
    div.style.border = "2px solid #ccc";
    div.style.borderRadius = "8px";
    div.style.boxShadow = "0 0 10px rgba(0,0,0,0.3)";

    div.innerHTML =
        "<h4>Statuts</h4>" +

        '<p><span style="display:inline-block;width:15px;height:15px;background:orange;border-radius:50%;"></span> En attente</p>' +

        '<p><span style="display:inline-block;width:15px;height:15px;background:blue;border-radius:50%;"></span> En cours</p>' +

        '<p><span style="display:inline-block;width:15px;height:15px;background:green;border-radius:50%;"></span> Résolu</p>' +

        '<p><span style="display:inline-block;width:15px;height:15px;background:red;border-radius:50%;"></span> Rejeté</p>';

    return div;
};

legende.addTo(map);
if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(function(position){

        var latitude = position.coords.latitude;
        var longitude = position.coords.longitude;

        L.marker([latitude, longitude])
        .addTo(map)
        .bindPopup("📍 Vous êtes ici")
        .openPopup();

        map.setView([latitude, longitude], 14);

    });

}
</script>

{% endblock %}
